name: FocusPlan
options:
  bundleIdPrefix: com.votronghoang
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  FocusPlan:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.votronghoang.focusplan
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Focus Plan
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
  FocusPlanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: FocusPlan
  FocusPlanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: FocusPlan
    dependencies:
      - target: FocusPlan
